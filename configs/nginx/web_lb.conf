# 1. This is a sample Nginx configuration file for a web load balancer. It distributes incoming traffic to two backend Apache web servers using the least connections method.
# 2. Save this configuration on your Nginx server at /etc/nginx/sites-available/web_lb

upstream my_web_cluster {
    # Distributes traffic between your two Apache nodes using least connections
    least_conn;
    server 192.168.192.145:80; # Web App 1 
    server 192.168.192.146:80; # Web App 2 
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name _; # Responds to all incoming requests 

    # Global logging configurations
    access_log /var/log/nginx/cluster_access.log;
    error_log /var/log/nginx/cluster_error.log warn;

    location / {
        proxy_pass http://my_web_cluster; # Forward traffic to the upstream cluster 
        
        # Standard HTTP Header rewrites for backend proxy awareness
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 

        # Timeouts to handle unresponsive backend nodes gracefully
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Error pages configuration
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
    }
}
