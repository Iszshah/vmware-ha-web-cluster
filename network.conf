# 1.This maps out your netplan interface framework applied at /etc/netplan/50-cloud-init.yaml.

network:
  [cite_start]version: 2 # 
  renderer: networkd
  ethernets:
    [cite_start]ens33: # Target ethernet hardware adapter name 
      [cite_start]dhcp4: no 
      addresses:
        - [cite_start]192.168.192.xxx/24 # Replace 'xxx' with the exact server host IP 
      routes:
        - [cite_start]to: default # [cite: 31]
          [cite_start]via: 192.168.192.2 # VMware NAT gateway IP 
      nameservers:
        addresses:
          - [cite_start]8.8.8.8 # Google DNS Primary 
          - [cite_start]8.8.4.4 # Google DNS Secondary 